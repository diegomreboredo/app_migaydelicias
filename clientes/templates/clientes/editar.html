{% extends "base.html" %}

{% block title %}
Editar Cliente
{% endblock %}

{% block content %}
<a href="/clientes/"
   class="btn btn-outline-secondary mb-3">

    <i class="bi bi-arrow-left me-2"></i>

    Volver a Clientes

</a>

<div class="card border-0 shadow-sm">

    <div class="card-body">

        <h2 class="fw-bold mb-4">
            Editar Cliente
        </h2>

        <form method="post">

            {% csrf_token %}

            {{ form.as_p }}

            <button
                type="submit"
                class="btn btn-primary">

                Guardar Cambios

            </button>

        </form>

    </div>

</div>

{% endblock %}
