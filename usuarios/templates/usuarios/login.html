<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1"
    >

    <title>
        ERP Platform
    </title>

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
        rel="stylesheet"
    >

    {% load static %}

    <link
        rel="stylesheet"
        href="{% static 'css/erp-platform.css' %}"
    >

</head>

<body>

<div
    class="container-fluid min-vh-100"
>

    <div
        class="row min-vh-100"
    >

        <!-- Panel izquierdo -->

        <div
            class="col-lg-6 d-none d-lg-flex flex-column justify-content-center align-items-center text-white"
            style="
                background:
                linear-gradient(
                    135deg,
                    #0D6EFD,
                    #084298
                );
            "
        >

            <div
                class="text-center px-5"
            >

                <i
                    class="bi bi-shop"
                    style="
                        font-size: 6rem;
                    "
                ></i>

                <h1
                    class="display-4 fw-bold mt-4"
                >
                    ERP Platform
                </h1>

                <p
                    class="lead mt-4"
                >
                    Gestión simple para negocios reales.
                </p>

                <div class="mt-5">

                    <p>
                        ✅ Pedidos
                    </p>

                    <p>
                        ✅ Compras
                    </p>

                    <p>
                        ✅ Inventario
                    </p>

                    <p>
                        ✅ Caja
                    </p>

                    <p>
                        ✅ Reportes
                    </p>

                </div>

            </div>

        </div>

        <!-- Login -->

        <div
            class="col-lg-6 d-flex justify-content-center align-items-center"
        >

            <div
                class="card p-4 p-md-5"
                style="
                    width:100%;
                    max-width:500px;
                "
            >

                <div class="text-center mb-4">

                    <h2
                        class="fw-bold"
                    >
                        Bienvenido 👋
                    </h2>

                    <p
                        class="text-muted"
                    >
                        Ingresá para continuar
                    </p>

                </div>

                {% if form.errors %}

                <div
                    class="alert alert-danger"
                >

                    Usuario o contraseña incorrectos.

                </div>

                {% endif %}

                <form method="post">

                    {% csrf_token %}

                    <div class="mb-3">

                        <label
                            class="form-label"
                        >

                            Usuario

                        </label>

                        <input
                            type="text"
                            name="username"
                            class="form-control form-control-lg"
                            required
                        >

                    </div>

                    <div class="mb-4">

                        <label
                            class="form-label"
                        >

                            Contraseña

                        </label>

                        <input
                            type="password"
                            name="password"
                            class="form-control form-control-lg"
                            required
                        >

                    </div>

                    <button
                        type="submit"
                        class="btn btn-primary btn-lg w-100"
                    >

                        <i
                            class="bi bi-box-arrow-in-right"
                        ></i>

                        Ingresar

                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

</body>

</html>
