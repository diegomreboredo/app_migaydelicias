{% extends "base.html" %}

{% block title %}
Nueva compra
{% endblock %}

{% block content %}

<a href="{% url 'lista_compras' %}"
   class="btn btn-outline-secondary mb-3">

    <i class="bi bi-arrow-left me-2"></i>

    Volver

</a>

<div class="card border-0 shadow-sm">

    <div class="card-body">

        <h2 class="fw-bold mb-1">
            Nueva compra
        </h2>

        <small class="text-muted">
            Registrá una nueva compra a un proveedor.
        </small>

        <hr>

        <form method="post">

            {% csrf_token %}

            <div class="mb-3">

                <label class="form-label">

                    Proveedor

                </label>

                {{ form.proveedor }}

            </div>

            <div class="mb-3">

                <label class="form-label">

                    Estado

                </label>

                {{ form.estado }}

            </div>

            <div class="mb-4">

                <label class="form-label">

                    Observaciones

                </label>

                {{ form.observaciones }}

            </div>

            <div class="d-flex justify-content-end gap-2">

                <a href="{% url 'lista_compras' %}"
                   class="btn btn-outline-secondary">

                    Cancelar

                </a>

                <button
                    type="submit"
                    class="btn btn-primary">

                    <i class="bi bi-save me-2"></i>

                    Guardar compra

                </button>

            </div>

        </form>

    </div>

</div>

{% endblock %}
