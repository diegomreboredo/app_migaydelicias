{% extends "base.html" %}

{% block title %}
Dashboard
{% endblock %}

{% block content %}

<div class="container-fluid">

    <div class="mb-4">
        <h2>Dashboard</h2>
        <p class="text-muted">
            Bienvenido al ERP Platform
        </p>
    </div>

    <div class="row g-4">

        <div class="col-md-3">
            <div class="card p-3">
                <h6 class="text-secondary">
                    Ventas del día
                </h6>

                <h3>
                    $0
                </h3>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card p-3">
                <h6 class="text-secondary">
                    Pedidos
                </h6>

                <h3>
                    0
                </h3>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card p-3">
                <h6 class="text-secondary">
                    Compras
                </h6>

                <h3>
                    0
                </h3>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card p-3">
                <h6 class="text-secondary">
                    Caja
                </h6>

                <h3>
                    $0
                </h3>
            </div>
        </div>

    </div>

    <div class="mt-5">

        <h4>
            Accesos rápidos
        </h4>

        <div class="row g-3 mt-2">

            <div class="col-md-3">
                <button class="btn btn-primary w-100 p-3">
                    🛒 Nuevo Pedido
                </button>
            </div>

            <div class="col-md-3">
                <button class="btn btn-success w-100 p-3">
                    💰 Caja
                </button>
            </div>

            <div class="col-md-3">
                <button class="btn btn-warning w-100 p-3">
                    📦 Compras
                </button>
            </div>

            <div class="col-md-3">
                <button class="btn btn-dark w-100 p-3">
                    📊 Reportes
                </button>
            </div>

        </div>

    </div>

</div>

{% endblock %}
